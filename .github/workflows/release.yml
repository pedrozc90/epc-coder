name: Maven Package

on:
    push:
        tags:
            - "v*"

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup JDK
              uses: actions/setup-java@v5
              with:
                  distribution: "temurin"
                  java-version: "21"
                  java-package: "jdk"
                  cache: "maven"
                  server-id: "github"
                  settings-path: ${{ github.workspace }} # location for the settings.xml file

            - name: Test
              run: mvn -B test --file pom.xml

            - name: Build
              run: mvn -B package -DskipTests --file pom.xml

            - name: Publish
              run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
              env:
                  GITHUB_TOKEN: ${{ github.token }}
            
            - name: Create Release
              run: |
                # Select the main JAR (exclude sources/javadoc jars if present)
                JAR_FILE="$(ls -1 target/epc-coder-*.jar | grep -vE '(-sources|-javadoc)\.jar$' | head -n 1)"

                if [ -z "$JAR_FILE" ]; then
                    echo "No JAR found to upload in target/"
                    ls -la target || true
                    exit 1
                fi

                # create a new release using the GitHub CLI
                gh release create "${{ github.ref_name }}" \
                    --verify-tag \
                    --title "${{ github.ref_name }}" \
                    --generate-notes \
                    "$JAR_FILE"
              env:
                GH_TOKEN: ${{ github.token }}
